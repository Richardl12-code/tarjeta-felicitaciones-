<!DOCTYPE html>
<html>
<head>
    <title>🎇 ¡Feliz Cumpleaños! 🎂</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            z-index: 100;
            pointer-events: none; /* Para que no interfiera con los fuegos artificiales */
        }
        h1 {
            color: #d23369;
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        p {
            color: #333;
            font-size: 1.1em;
        }
        .cake {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            z-index: 50;
            transition: transform 0.3s ease;
        }
        /* Estilos para los juegos artificiales */
        .firework {
            position: absolute;
            bottom: 0;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 2s ease-out forwards;
        }
        @keyframes explode {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Pastel animado -->
    <img class="cake" src="https://emojicdn.elk.sh/🎂" alt="Pastel" id="cake">

    <!-- Tarjeta de felicitación -->
    <div class="card">
        <h1>🎇 Happy Birthday! 🎉</h1>
        <p>Te deseo un día lleno de alegría y risas, la pases bien con tu familia y amigos!</p>
        <p>Que cada desafío se convierta en una experiencia enriquecedora y que cada logro sea motivo de orgullo y alegría.</p>
        <p>Ánimo y fuerza... y que logres cada meta que te propongas :)</p>
    </div>

    <!-- Juegos artificiales con JavaScript -->
    <script>
        // Animación del pastel
        const cake = document.getElementById('cake');
        let scale = 1;
        setInterval(() => {
            scale = scale === 1 ? 1.1 : 1;
            cake.style.transform = `translateX(-50%) scale(${scale})`;
        }, 500);

        // Crear fuegos artificiales
        function createFirework() {
            const firework = document.createElement('div');
            firework.className = 'firework';
            
            // Posición inicial aleatoria en la parte inferior
            const x = Math.random() * window.innerWidth;
            firework.style.left = `${x}px`;
            
            // Color aleatorio brillante
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff6600', '#ff0066'];
            firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            firework.style.boxShadow = `0 0 8px ${firework.style.backgroundColor}`;
            
            // Dirección de explosión aleatoria
            const angle = Math.random() * Math.PI * 2;
            const distance = 150 + Math.random() * 250;
            const tx = Math.cos(angle) * distance;
            const ty = -(Math.sin(angle) * distance + 50); // Hacia arriba principalmente
            
            firework.style.setProperty('--tx', `${tx}px`);
            firework.style.setProperty('--ty', `${ty}px`);
            
            document.body.appendChild(firework);
            
            // Eliminar después de la animación
            setTimeout(() => firework.remove(), 2000);
        }

        // Disparar fuegos artificiales cada 400ms
        setInterval(createFirework, 400);
        
        // Crear algunos fuegos artificiales adicionales al inicio
        for(let i = 0; i < 10; i++) {
            setTimeout(createFirework, i * 100);
        }
    </script>
</body>
</html>
